<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Cập nhật - Lập trình web</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 800px;
            border: 1px solid #333;
        }

        header,
        footer {
            border: 1px solid #333;
            margin: 10px;
            padding: 10px;
            text-align: center;
        }

        main {
            padding: 40px;
            display: flex;
            justify-content: center;
            min-height: 400px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 30px;
            width: 450px;
        }

        .card h2 {
            text-align: center;
            font-weight: normal;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        .form-group label {
            width: 120px;
            font-size: 14px;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #333;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            padding-left: 120px;
            margin-top: 20px;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        .link-alt {
            color: #007bff;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html">Home</a> | <a href="login.html">Đăng nhập</a> | <a href="register.html">Đăng ký</a>
        </header>
        <main>
            <div class="card">
                <h2>Màn hình cập nhật</h2>
                <form action="list.html">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="test1" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" value="******" required>
                    </div>
                    <div class="form-group">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" value="******" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="test1@gmail.com" required>
                    </div>
                    <div class="form-footer">
                        <a href="list.html" class="link-alt">Hủy bỏ</a>
                        <button type="submit" class="btn">Cập nhật</button>
                    </div>
                </form>
            </div>
        </main>
        <footer>Lập trình web @01/2024</footer>
    </div>
</body>

</html>
